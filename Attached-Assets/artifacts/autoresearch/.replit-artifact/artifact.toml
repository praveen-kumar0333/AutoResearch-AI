kind = "web"
previewPath = "/"
title = "AutoResearch AI"
version = "1.0.0"
id = "artifacts/autoresearch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25945

[services.development]
run = "pnpm --filter @workspace/autoresearch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autoresearch", "run", "build" ]
publicDir = "artifacts/autoresearch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25945"
BASE_PATH = "/"
